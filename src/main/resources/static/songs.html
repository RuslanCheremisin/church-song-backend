<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Песни</title>
</head>
<body>
<h1>Песни</h1>
<h3 id="currentUser">Текущий пользователь</h3>
<div class="photo">
    <img id=userPhoto src="" alt="фото пользователя">
</div>
    <div>
        <nav>
            <form action="/home" method="get">
                <button type="submit">Домой</button>
            </form>
            <p></p>
            <div id="loginButton">
                <form action="/auth" method="get">
                    <button type="submit">Вход</button>
                </form>
                <p></p>
            </div>
            <div id="songsButton">
                <form action="/songspage" method="get">
                    <button type="submit">Песни</button>
                </form>
                <p></p>
            </div>
            <div id="bandsButton">
                <form action="/bandspage" method="get">
                    <button type="submit">Группы</button>
                </form>
                <p></p>
            </div>
            <form action="/auth" method="get">
                <button type="submit">Регистрация</button>
            </form>
            <p></p>
            <form action="/logout" method="post" id="logoutElement">
                <button type="submit">Выход</button>
            </form>
        </nav>
    </div>
<div>
    <table id="currentBandSongs">
        <tr>
            <th>Песни группы</th>
        </tr>
    </table>
    <form action="/songspage/add" method="get">
        <button type="submit">Добавить группу</button>
    </form>
    <p></p>
</div>
<div>
    <table id="allSongs">
        <tr>
            <th>Все группы</th>
        </tr>
    </table>
</div>
</body>
<!--<script src="/js/bands.js"></script>-->
<script src="/js/auth.js"></script>
</html>
