<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Группы</title>
</head>
<body>
<h1>Добавление группы</h1>
<h3 id="currentUser">Текущий пользователь</h3>
    <div>
        <nav>
            <form action="/home" method="get">
                <button type="submit">Домой</button>
            </form>
            <p></p>
            <div id="loginButton">
                <form action="/auth" method="get">
                    <button type="submit">Вход</button>
                </form>
                <p></p>
            </div>
            <div id="bandsButton">
                <form action="/bandspage" method="get">
                    <button type="submit">Группы</button>
                </form>
                <p></p>
            </div>
            <form action="/auth" method="get">
                <button type="submit">Регистрация</button>
            </form>
            <p></p>
            <form action="/logout" method="post" id="logoutElement">
                <button type="submit">Выход</button>
            </form>
        </nav>
    </div>
<h2>Добавить группу</h2>
<div>
    <form action="/bands" method="post">
        <input type="text" id="name" name="Название" placeholder="Название группы">
        <p></p>
        <input type="text" id="email" name="email" placeholder="e-mail">
        <p></p>
        <input type="text"  id="contactPhone" name="Телефон" placeholder="+7 999 99 99 990">
        <p></p>
        <input type="text" id="bio" name="О группе" placeholder="Привет! Мы новая группа">
        <p></p>
        <button type="button" onclick="handleCreateBand()">Добавить</button>
    </form>
    <p></p>

</div>
</body>
<!--<script src="/js/bands.js"></script>-->
<script src="/js/auth.js"></script>
</html>
