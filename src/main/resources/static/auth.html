<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Church song</title>
</head>
<body>
<div>
    <nav>
        <form action="/home" method="get">
            <button type="submit">Домой</button>
        </form>
        <p></p>
    </nav>
</div>
<h1>Login or register</h1>
<h3 id="currentUser">Текущий пользователь</h3>
<img id=userPhoto src="" alt="фото пользователя" class="round-image">
<h2 id="loginHeader">Login</h2>
<div class="container mt-5" id="loginContainer">
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="LOGIN">
        <input type="text" name="password" placeholder="PASSWORD">
        <button type="submit">Login</button>
    </form>
</div>
<h2>Register</h2>
<div>
    <form action="/auth/local/register" method="post">
        <label>Фото пользователя</label>
        <input type="file" id="photo" name="Фото" accept="image/*" >
        <p></p>
        <input type="text" id="firstName" name="firstName" placeholder="First name">
        <p></p>
        <input type="text" id="lastName" name="lastName" placeholder="Last name">
        <p></p>
        <input type="text" id="username" name="username" placeholder="username">
        <p></p>
        <input type="text" id="password" name="password" placeholder="password">
        <p></p>
        <input type="text" id="email" name="email" placeholder="e-mail">
        <p></p>
        <button type="button" onclick="handleRegisterUser()">Добавить</button>
    </form>
    <p></p>
    <form action="/logout" method="post" id="logoutElement">
        <button type="submit">Выход</button>
    </form>
</div>
<h2 id="loginWOtherStuffHeader">Login with other stuff</h2>
<div class="container mt-5" id="loginWithOtherStuffContainer">
    <form action="/oauth2/authorization/google" method="POST">
        <button type="submit">Google</button>
    </form>
    <p></p>
    <form action="/oauth2/authorization/yandex" method="POST">
        <button type="submit">Yandex</button>
    </form>
    <p></p>
    <form action="/oauth2/authorization/telegram" method="POST" id="telegramLoginForm">
        <button onclick="loginWithTelegram()">Telegram</button>
    </form>
    <p></p>

</div>

</body>
<script src="https://telegram.org/js/telegram-widget.js?22"></script>
<script src="/js/auth.js"></script>
</html>
